name: Sync Issue to Public

on:
  issues:
    types: [opened]

jobs:
  sync-to-public:
    runs-on: ubuntu-latest
    # synced-from-public ラベルが付いている場合はスキップ（ループ防止）
    if: "!contains(github.event.issue.labels.*.name, 'synced-from-public')"
    steps:
      - name: Create issue in Public repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CROSS_REPO_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            labels.push('synced-from-dev');

            // フィードバックサーバー経由かどうかを判定
            const isFromFeedback = issue.body && issue.body.includes('MaxRefMCP フィードバック');
            const source = isFromFeedback ? 'フィードバックサーバー' : 'Dev リポジトリ';

            const body = `> この Issue は ${source}（[MaxRefMCP_Dev#${issue.number}](${issue.html_url})）から同期されました。\n\n${issue.body || ''}`;

            const created = await github.rest.issues.create({
              owner: 'dsgarage',
              repo: 'MaxRefMCP',
              title: issue.title,
              body: body,
              labels: labels
            });

            // 元の Issue にリンクコメントを追加
            await github.rest.issues.createComment({
              owner: 'dsgarage',
              repo: 'MaxRefMCP_Dev',
              issue_number: issue.number,
              body: `公開リポジトリに同期しました: dsgarage/MaxRefMCP#${created.data.number}`
            });
